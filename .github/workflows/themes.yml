name: themes
# 하루 4회(KST 08/12/18/00 = UTC 23/03/09/15) 테마 전망 생성 + themes.json 커밋
on:
  schedule:
    - cron: "0 23,3,9,15 * * *"
  workflow_dispatch:
permissions:
  contents: write
jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install requests
      - name: Generate themes
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          NAVER_CLIENT_ID: ${{ secrets.NAVER_CLIENT_ID }}
          NAVER_CLIENT_SECRET: ${{ secrets.NAVER_CLIENT_SECRET }}
        run: python scripts/generate_themes.py
      - name: Commit themes.json
        run: |
          git config user.name "themes-bot"
          git config user.email "actions@users.noreply.github.com"
          git add themes.json
          git diff --staged --quiet || git commit -m "themes auto-update"
          git push
